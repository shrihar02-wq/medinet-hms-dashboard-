<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediNet HMS Login</title>

<link rel="icon" type="image/png" href="logo.jpeg">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GOOGLE FONT */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  background:
  linear-gradient(
  135deg,
  #eaf1ff,
  #f4f8ff,
  #ffffff);

  min-height:100vh;

  overflow:hidden;

  position:relative;
}

/* BACKGROUND GLOW */

body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background:rgba(47,111,237,0.12);
  top:-180px;
  left:-120px;
  filter:blur(40px);
}

body::after{
  content:"";
  position:absolute;
  width:450px;
  height:450px;
  border-radius:50%;
  background:rgba(74,141,246,0.12);
  bottom:-180px;
  right:-120px;
  filter:blur(40px);
}

/* NAVBAR */

.navbar{
  position:fixed;
  top:0;
  width:100%;

  background:
  linear-gradient(
  135deg,
  #2f6fed,
  #4a8df6);

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 45px;

  color:white;

  z-index:1000;

  box-shadow:
  0 8px 25px rgba(47,111,237,0.35);

  backdrop-filter:blur(10px);
}

/* LOGO */

.logo-box{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  font-size:22px;

  background:white;

  color:#2f6fed;

  padding:12px;

  border-radius:50%;

  box-shadow:
  0 6px 18px rgba(0,0,0,0.15);

  transition:0.4s ease;
}

.logo-icon:hover{
  transform:rotate(12deg) scale(1.08);
}

.logo-text{
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
}

/* NAV LINKS */

.nav-links a{
  color:white;
  margin-left:22px;
  text-decoration:none;
  font-size:15px;
  font-weight:500;
  position:relative;
  transition:0.3s;
}

.nav-links a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0%;
  height:2px;
  background:white;
  transition:0.3s;
}

.nav-links a:hover::after{
  width:100%;
}

.nav-links a:hover{
  opacity:0.9;
}

/* LOGIN CONTAINER */

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding-top:70px;
  position:relative;
  z-index:2;
}

/* LOGIN CARD */

.card{
  width:400px;

  padding:38px;

  border-radius:28px;

  background:
  rgba(255,255,255,0.75);

  backdrop-filter:blur(20px);

  border:
  1px solid rgba(255,255,255,0.5);

  box-shadow:
  0 20px 45px rgba(47,111,237,0.18);

  transition:0.45s ease;

  position:relative;

  overflow:hidden;
}

/* CARD TOP GLOW */

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;

  background:
  linear-gradient(
  to right,
  #2f6fed,
  #4a8df6,
  #7db4ff);
}

/* CARD HOVER */

.card:hover{

  transform:
  translateY(-10px)
  scale(1.01);

  box-shadow:
  0 30px 60px rgba(47,111,237,0.28);
}

/* TITLE */

.card h2{
  text-align:center;
  margin-bottom:28px;
  color:#2f6fed;
  font-size:34px;
  font-weight:700;
  letter-spacing:1px;
}

/* INPUTS */

input,
select{

  width:100%;

  padding:15px 18px;

  margin:14px 0;

  border-radius:16px;

  border:
  1px solid rgba(47,111,237,0.15);

  outline:none;

  transition:0.35s ease;

  font-size:15px;

  background:
  rgba(255,255,255,0.9);

  color:#333;

  box-shadow:
  inset 0 2px 6px rgba(255,255,255,0.7),
  0 5px 15px rgba(47,111,237,0.06);
}

/* PLACEHOLDER */

input::placeholder{
  color:#8a94a6;
}

/* INPUT FOCUS */

input:focus,
select:focus{

  border-color:#2f6fed;

  background:white;

  transform:translateY(-2px);

  box-shadow:
  0 0 0 4px rgba(47,111,237,0.12),
  0 10px 22px rgba(47,111,237,0.15);
}

/* SELECT EFFECT */

select{
  cursor:pointer;
  appearance:none;

  background-image:
  linear-gradient(45deg,transparent 50%,#2f6fed 50%),
  linear-gradient(135deg,#2f6fed 50%,transparent 50%);

  background-position:
  calc(100% - 22px) calc(50% - 4px),
  calc(100% - 16px) calc(50% - 4px);

  background-size:6px 6px,6px 6px;

  background-repeat:no-repeat;
}

/* SELECT HOVER */

select:hover{
  box-shadow:
  0 8px 20px rgba(47,111,237,0.12);
}

/* BUTTON */

button{

  width:100%;

  padding:15px;

  margin-top:18px;

  border:none;

  border-radius:18px;

  background:
  linear-gradient(
  135deg,
  #2f6fed,
  #4a8df6);

  color:white;

  font-weight:600;

  font-size:16px;

  cursor:pointer;

  transition:0.35s ease;

  letter-spacing:0.5px;

  box-shadow:
  0 10px 25px rgba(47,111,237,0.25);
}

/* BUTTON HOVER */

button:hover{

  transform:
  translateY(-4px)
  scale(1.02);

  box-shadow:
  0 18px 35px rgba(47,111,237,0.35);

  background:
  linear-gradient(
  135deg,
  #2563eb,
  #60a5fa);
}

/* REGISTER TEXT */

.register-text{
  text-align:center;
  margin-top:22px;
  color:#555;
  font-size:14px;
}

.register-text a{
  color:#2f6fed;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.register-text a:hover{
  color:#174dc9;
  text-decoration:underline;
}

/* FOOTER */

footer{

  text-align:center;

  padding:14px;

  background:
  linear-gradient(
  135deg,
  #2f6fed,
  #4a8df6);

  color:white;

  position:fixed;

  bottom:0;

  width:100%;

  font-size:13px;

  letter-spacing:0.5px;

  box-shadow:
  0 -4px 15px rgba(0,0,0,0.1);
}

/* MOBILE */

@media(max-width:768px){

.navbar{
  flex-direction:column;
  gap:12px;
  padding:18px;
}

.nav-links{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.nav-links a{
  margin:8px;
}

.card{
  width:92%;
  padding:28px;
}

.card h2{
  font-size:28px;
}

}
/* SELECT ROLE ADVANCED EFFECT */

select{

  width:100%;

  padding:16px 20px;

  margin:14px 0;

  border-radius:18px;

  border:1.5px solid rgba(47,111,237,0.18);

  outline:none;

  font-size:15px;

  font-weight:500;

  color:#2f3b55;

  cursor:pointer;

  appearance:none;

  background:
  linear-gradient(
  145deg,
  rgba(255,255,255,0.98),
  rgba(240,246,255,0.95));

  box-shadow:
  inset 0 2px 8px rgba(255,255,255,0.9),
  0 6px 18px rgba(47,111,237,0.08);

  transition:0.35s ease;

  position:relative;

  /* CUSTOM ARROW */

  background-image:
  linear-gradient(45deg,transparent 50%,#2f6fed 50%),
  linear-gradient(135deg,#2f6fed 50%,transparent 50%),
  linear-gradient(to right,#dbeafe,#dbeafe);

  background-position:
  calc(100% - 22px) calc(50% - 3px),
  calc(100% - 16px) calc(50% - 3px),
  calc(100% - 48px) 50%;

  background-size:
  7px 7px,
  7px 7px,
  1px 24px;

  background-repeat:no-repeat;
}

/* HOVER EFFECT */

select:hover{

  transform:translateY(-2px);

  border-color:#4a8df6;

  box-shadow:
  0 12px 25px rgba(47,111,237,0.16),
  0 0 0 4px rgba(47,111,237,0.05);
}

/* FOCUS EFFECT */

select:focus{

  border-color:#2563eb;

  background:
  linear-gradient(
  145deg,
  #ffffff,
  #eef5ff);

  box-shadow:
  0 0 0 5px rgba(37,99,235,0.14),
  0 14px 30px rgba(37,99,235,0.18);

  transform:
  translateY(-2px)
  scale(1.01);
}

/* OPTION STYLE */

select option{

  padding:12px;

  background:#ffffff;

  color:#1e3a8a;

  font-size:15px;
}
</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

  <div class="logo-box">
    <i class="fa-solid fa-heart-pulse logo-icon"></i>
    <span class="logo-text">MediNet HMS</span>
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#services">Services</a>
    <a href="doctors.html">Doctors</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </div>

</nav>

<!-- LOGIN SECTION -->

<div class="container">

  <div class="card">

    <h2>Login Page</h2>

    <form action="LoginServlet" method="post">

      <input type="email"
             name="email"
             placeholder="Enter Email"
             required>

      <input type="password"
             name="password"
             placeholder="Enter Password"
             required>

      <select name="role" required>

        <option value="">
          Select Role
        </option>

        <option value="patient">
          Patient
        </option>

        <option value="doctor">
          Doctor
        </option>

      </select>

      <button type="submit">
        Login
      </button>

      <p class="register-text">

        New User?

        <a href="register.html">
          Create Account
        </a>

      </p>

    </form>

  </div>

</div>

<!-- FOOTER -->

<footer>
  © 2026 MediNet Hospital Management System
</footer>

</body>
</html>
